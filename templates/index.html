<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多门店员工排班系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🏪 多门店员工排班系统</h1>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="openGenerateModal()">自动排班</button>
                <button class="btn btn-success" onclick="openExportModal()">导出Excel</button>
                <button class="btn btn-info" onclick="sendEmail()">发送邮件</button>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>📅 日期范围</h3>
                    <div class="date-picker-group">
                        <label>开始日期</label>
                        <input type="date" id="startDate">
                    </div>
                    <div class="date-picker-group">
                        <label>结束日期</label>
                        <input type="date" id="endDate">
                    </div>
                    <button class="btn btn-block btn-secondary" onclick="loadSchedules()">刷新排班</button>
                </div>

                <div class="sidebar-section">
                    <h3>🏬 门店筛选</h3>
                    <select id="storeFilter" onchange="loadSchedules()">
                        <option value="">全部门店</option>
                    </select>
                </div>

                <div class="sidebar-section">
                    <h3>👥 员工列表</h3>
                    <div class="employee-list" id="employeeList">
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>🏬 门店视图</h3>
                    <div id="storeLinks" class="store-links">
                        <p class="tip" style="font-size: 12px;">加载中...</p>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>📊 快捷操作</h3>
                    <button class="btn btn-block btn-warning" onclick="showSummary()">查看汇总表</button>
                    <button class="btn btn-block btn-danger" onclick="showWorkhours()">工时统计</button>
                </div>

                <div class="sidebar-section legend">
                    <h3>📌 图例说明</h3>
                    <div class="legend-item">
                        <span class="legend-color senior"></span>
                        <span>高级员工</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color junior"></span>
                        <span>初级员工</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color conflict"></span>
                        <span>冲突/警告</span>
                    </div>
                </div>
            </aside>

            <main class="content-area">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('calendar')" id="tab-calendar">日历视图</button>
                    <button class="tab-btn" onclick="switchTab('summary')" id="tab-summary">汇总表</button>
                    <button class="tab-btn" onclick="switchTab('workhours')" id="tab-workhours">工时统计</button>
                    <button class="tab-btn" onclick="switchTab('release')" id="tab-release">发布管理</button>
                    <button class="tab-btn" onclick="switchTab('emaillog')" id="tab-emaillog">邮件记录</button>
                </div>

                <div class="tab-content active" id="content-calendar">
                    <div id="calendar"></div>
                </div>

                <div class="tab-content" id="content-summary">
                    <div class="summary-container" id="summaryContainer">
                        <p class="empty-tip">请选择日期范围后点击"查看汇总表"</p>
                    </div>
                </div>

                <div class="tab-content" id="content-workhours">
                    <div class="workhours-container" id="workhoursContainer">
                        <p class="empty-tip">请点击"工时统计"查看本月工时情况</p>
                    </div>
                </div>

                <div class="tab-content" id="content-release">
                    <div class="release-container" id="releaseContainer">
                        <p class="empty-tip">加载中...</p>
                    </div>
                </div>

                <div class="tab-content" id="content-emaillog">
                    <div class="email-log-container" id="emailLogContainer">
                        <p class="empty-tip">加载中...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal" id="generateModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>自动排班</h3>
                <span class="close" onclick="closeGenerateModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>开始日期</label>
                    <input type="date" id="genStartDate">
                </div>
                <div class="form-group">
                    <label>结束日期</label>
                    <input type="date" id="genEndDate">
                </div>
                <p class="tip">系统将根据员工可用时间、技能等级和门店需求自动生成排班，并尽量均衡工时和照顾员工偏好。</p>
                <div id="genResult" style="display:none; margin-top: 12px;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeGenerateModal()">关闭</button>
                <button class="btn btn-primary" onclick="generateSchedule()" id="genBtn">生成排班</button>
            </div>
        </div>
    </div>

    <div class="modal" id="exportModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>导出Excel</h3>
                <span class="close" onclick="closeExportModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>开始日期</label>
                        <input type="date" id="expStartDate">
                    </div>
                    <div class="form-group">
                        <label>结束日期</label>
                        <input type="date" id="expEndDate">
                    </div>
                </div>
                <div class="form-group">
                    <label>导出范围</label>
                    <select id="expStoreId">
                        <option value="">全部门店</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>导出模式</label>
                    <select id="expMode">
                        <option value="full">完整导出（含汇总+各门店+工时）</option>
                        <option value="store">门店模式（矩阵式排班视图）</option>
                        <option value="simple">店长简版（周视图，简洁明了）</option>
                        <option value="week">按周汇总</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeExportModal()">取消</button>
                <button class="btn btn-success" onclick="doExportExcel()">确认导出</button>
            </div>
        </div>
    </div>

    <div class="modal" id="deleteConfirmModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>确认删除排班</h3>
                <span class="close" onclick="closeDeleteConfirmModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p id="deleteConfirmText">确定要删除这条排班吗？</p>
                <div id="deleteWarning" style="display:none;"></div>
                <div id="forceDeleteOption" style="display:none; margin-top: 12px;">
                    <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:13px; color:#595959;">
                        <input type="checkbox" id="forceDeleteCheck">
                        我已知晓会导致门店缺人，确认强制删除
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeDeleteConfirmModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmDelete()" id="confirmDeleteBtn">确认删除</button>
            </div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑排班</h3>
                <span class="close" onclick="closeEditModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editScheduleId">
                <div class="form-group">
                    <label>员工</label>
                    <select id="editEmployee"></select>
                </div>
                <div class="form-group">
                    <label>门店</label>
                    <select id="editStore"></select>
                </div>
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="editDate">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>开始时间</label>
                        <input type="time" id="editStartTime">
                    </div>
                    <div class="form-group">
                        <label>结束时间</label>
                        <input type="time" id="editEndTime">
                    </div>
                </div>
                <div id="conflictWarning" class="conflict-warning" style="display:none;">
                    <h4>⚠️ 冲突检测</h4>
                    <ul id="conflictList"></ul>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" onclick="deleteSchedule()" id="deleteBtn">删除</button>
                <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary" onclick="saveSchedule()">保存</button>
            </div>
        </div>
    </div>

    <div class="modal" id="diffModal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h3 id="diffModalTitle">版本差异对比</h3>
                <button class="close-btn" onclick="closeDiffModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="diff-summary">
                    <span id="diffSummaryText">变更统计</span>
                    <div class="diff-stats" id="diffStats"></div>
                </div>
                <div class="diff-list" id="diffList"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeDiffModal()">关闭</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/zh-cn.js"></script>
    <script src="/static/js/app.js?v=2"></script>
</body>
</html>
